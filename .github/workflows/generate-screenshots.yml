name: Update Repository Statistics

# Workflow para gerar previews e documentação automática
on:
  workflow_dispatch:  # Permite execução manual
  push:
    branches: [ main ]
    paths:
      - '.config/waybar/**'
      - '.config/hypr/**'
      - 'screenshots/**'

jobs:
  update-readme:
    name: Atualizar README com Estatísticas
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Gera estatísticas do repositório
      - name: Generate statistics
        run: |
          echo "📊 Gerando estatísticas..."
          
          # Conta scripts
          SCRIPT_COUNT=$(find .config -name "*.sh" | wc -l)
          
          # Conta pacotes
          PKG_COUNT=$(wc -l < pkglist.txt)
          
          # Conta linhas de código
          TOTAL_LINES=$(find .config -name "*.sh" -o -name "*.lua" -o -name "*.fish" | xargs wc -l | tail -1 | awk '{print $1}')
          
          echo "::notice::Scripts: $SCRIPT_COUNT"
          echo "::notice::Linhas de código: $TOTAL_LINES"
          
          # Salva em arquivo
          cat > STATS.md << EOF
          # 📊 Estatísticas do Repositório
          
          - 📝 Scripts Shell: **$SCRIPT_COUNT**
          - 📦 Pacotes: **$PKG_COUNT**
          - 📄 Linhas de Código: **$TOTAL_LINES**
          
          *Atualizado automaticamente em $(date)*
          EOF

      # Commit das mudanças (se houver)
      - name: Commit statistics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add STATS.md
            git commit -m "docs: update repository statistics [skip ci]"
            git push
          else
            echo "Nenhuma mudança para commit"
          fi
